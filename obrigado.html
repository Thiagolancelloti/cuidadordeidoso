<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obrigado pelo contato</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ffffff,#e6f3e6);
}

.container{

text-align:center;
background:white;

padding:50px;
border-radius:25px;

max-width:500px;
width:90%;

box-shadow:0 20px 60px rgba(0,0,0,0.1);

animation:fadeIn 1s ease;

}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.icon{

font-size:70px;
color:#417165;

margin-bottom:20px;

animation:pulse 2s infinite;

}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

h1{
color:#417165;
margin-bottom:15px;
}

p{
color:#555;
font-size:17px;
line-height:1.6;
margin-bottom:30px;
}

.btn{

display:inline-block;

padding:14px 28px;

background:linear-gradient(135deg,#417165,#c97248);

color:white;

border-radius:30px;

text-decoration:none;

font-weight:bold;

transition:0.3s;

}

.btn:hover{

transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

</style>
</head>

<body>

<div class="container">

<div class="icon">
<i class="fas fa-check-circle"></i>
</div>

<h1>Mensagem enviada!</h1>

<p>
Obrigado por entrar em contato com a <strong>Cuidadores de Ouro</strong>.
Recebemos sua mensagem e em breve nossa equipe irá responder.
</p>

<p>
Nosso objetivo é conectar famílias a cuidadores dedicados e profissionais.
</p>

<a href="index.html" class="btn">
<i class="fas fa-arrow-left"></i> Voltar ao site
</a>

</div>

</body>
</html>
